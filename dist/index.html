<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>To Do List</title>
    <script defer src="main.js"></script></head>
    <body>
        <h1>To-Do List</h1>
        <button id="newProjectButton" class="button">Create New Project</button>
        <dialog id="project-dialog">
            <h2>New Project</h2>
            <label for="project-name">Enter new project name: </label>
            <input type="text" id="project-name">
            <button id="create-project-dialog-btn" class="button">Create</button>
            <button id="cancel-project-dialog-btn" class="button">Cancel</button>
        </dialog>
        <dialog id="task-dialog">
            <h2>New Task</h2>
            <label for="task-name">Name:</label>
            <input type="text" id="task-name">
            <label for="task-description">Description:</label>
            <input type="text" id="task-description">
            <label for="task-due-date">Due Date:</label>
            <input type="date" id="task-due-date">
            <fieldset>
                <label for="task-priority">Priority:</label>
                <input type="radio" id="low" name="task-priority" value="Low">
                <label for="low">Low</label>
                <input type="radio" id="medium" name="task-priority" value="Medium">
                <label for="medium">Medium</label>
                <input type="radio" id="high" name="task-priority" value="High">
                <label for="high">High</label>
            </fieldset>
            <button id="create-task-dialog-btn" class="button">Create</button>
            <button id="cancel-task-dialog-btn" class="button">Cancel</button>
        </dialog>
        <div id="content"></div>
    </body>
</html>

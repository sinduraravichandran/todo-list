<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>To Do List</title>
    </head>
    <body>
        <h1>To-Do List</h1>
        <button id="newProjectButton">Create New Project</button>
        <dialog id="dialog">
            <h2>New Project</h2>
            <label for="projectName">Enter new project name</label>
            <input type="text" id="projectName">
            <button id="close-dialog-btn">Create</button>
            <button id="cancel-dialog-btn">Cancel</button>
        </dialog>
        <div id="content"></div>
    </body>
</html>
